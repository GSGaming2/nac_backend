version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  app:
    build: .
    environment:
      DATABASE_URL: "mysql://appuser:apppassword@host.docker.internal:3306/myapp"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-secret-key"
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
